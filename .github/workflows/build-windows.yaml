name: Build for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Fail if branch is not main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/master'
        run: |
          echo "This workflow should not be triggered with workflow_dispatch on a branch other than main"
          exit 1

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cache NodeJS modules
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./app/node_modules
          key: windows-2022-deps-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup MSYS2 (provides dlltool.exe for GNU target)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-toolchain

      - name: Generate libnode.dll import library
        shell: msys2 {0}
        run: |
          NODE_EXE=$(which node)
          gendef "$NODE_EXE"
          dlltool --dllname node.exe --def node.def --output-lib /tmp/libnode.dll
          echo "LIBNODE_PATH=$(cygpath -w /tmp)" >> $GITHUB_ENV

      - name: Setup Rust toolchain (Windows GNU)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            app/mailcore-rs/target/
          key: win-x64-gnu-cargo-${{ hashFiles('app/mailcore-rs/Cargo.lock') }}
          restore-keys: |
            win-x64-gnu-cargo-

      - name: Build napi-rs addon (Windows x64 GNU)
        shell: msys2 {0}
        working-directory: app/mailcore-rs
        env:
          LIBNODE_PATH: ${{ env.LIBNODE_PATH }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          npx @napi-rs/cli build --release --target x86_64-pc-windows-gnu

      - name: Smoke test -- verify mailcore-napi loads
        working-directory: app
        run: node mailcore-rs/test/smoke.js

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DEBUG: electron-packager

      - name: Sign Application Files with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\app\dist\UnifyMail-win32-x64
          files-folder-filter: exe,dll,node
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create Windows Installer
        run: node build/create-signed-windows-installer.js

      - name: Sign Windows Installer with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\app\dist
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          files: |
            app/dist/UnifyMailSetup.exe
            app/dist/*.nupkg
            app/dist/RELEASES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
